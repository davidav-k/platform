services:
  postgres:
    container_name: tsp_postgres
    image: postgres:16.1
    restart: always
    env_file:
      - .env
    expose:
      - "5432"
    ports:
      - "5432:5432"
    volumes:
      - ./infrastructure/docker/pgdata:/var/lib/postgresql/data
      - ./infrastructure/docker/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - tsp-network

  redis:
    image: redis:7
    container_name: tsp_redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - tsp-network

  zipkin:
    image: openzipkin/zipkin
    container_name: tsp_zipkin
    ports:
      - "9411:9411"
    networks:
      - tsp-network

  mailhog:
    image: mailhog/mailhog
    container_name: mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - tsp-network

  kafka:
    image: apache/kafka:3.7.1
    container_name: tsp_kafka
    ports:
      - "${KAFKA_LOCAL_PORT:-9092}:29092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://localhost:${KAFKA_LOCAL_PORT:-9092}
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - tsp-network

  config-server:
    container_name: tsp_config
    build:
      context: ./infrastructure/config-server
      dockerfile: Dockerfile
    ports:
      - "8888:8888"
    env_file:
      - .env
    volumes:
      - ./config:/config
    environment:
      - SPRING_CLOUD_CONFIG_SERVER_NATIVE_SEARCH_LOCATIONS=file:/config/
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/8888; printf \"GET /actuator/health HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3; head -n 1 <&3 | grep -q \" 200 \"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - tsp-network

  eureka-server:
    container_name: tsp_eureka
    build:
      context: ./infrastructure/eureka-server
      dockerfile: Dockerfile
    ports:
      - "8761:8761"
    env_file:
      - .env
    depends_on:
      config-server:
        condition: service_healthy
#    environment:
#      - SPRING_CLOUD_CONFIG_ENABLED=false
#      - SPRING_CONFIG_IMPORT=optional:classpath:/application.yml # using without config server
    healthcheck:
      test: ["CMD-SHELL", "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/8761; printf \"GET /actuator/health HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3; head -n 1 <&3 | grep -q \" 200 \"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - tsp-network



  notification-service:
    container_name: tsp_notification_service
    build:
      context: ./backend/notification-service
      dockerfile: Dockerfile
    ports:
      - "8087:8087"
    env_file:
      - .env
    environment:
      - APPLICATION_PORT=8087
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      - NOTIFICATION_KAFKA_ENABLED=${NOTIFICATION_KAFKA_ENABLED:-true}
      - NOTIFICATION_KAFKA_TOPIC=${NOTIFICATION_KAFKA_TOPIC:-${KAFKA_TASK_EVENTS_TOPIC:-platform.task-events}}
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/8087; printf \"GET /actuator/health HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3; head -n 1 <&3 | grep -q \" 200 \"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - tsp-network

  gateway:
    container_name: tsp_gateway
    build:
      context: ./infrastructure/api-gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      user-service:
        condition: service_healthy
      task-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
#    environment:
#      - SPRING_CLOUD_CONFIG_ENABLED=false
#      - SPRING_CONFIG_IMPORT=optional:classpath:/application.yml # using without config server
    healthcheck:
      test: ["CMD-SHELL", "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/8080; printf \"GET /actuator/health HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3; head -n 1 <&3 | grep -q \" 200 \"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - tsp-network

  frontend:
    container_name: tsp_frontend
    build:
      context: ./frontend/vue-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    ports:
      - "5173:80"
    depends_on:
      gateway:
        condition: service_healthy
    networks:
      - tsp-network

  user-service:
    container_name: tsp_user_service
    build:
      context: ./backend/user-service
      dockerfile: Dockerfile
    ports:
      - "8085:8085"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      mailhog:
        condition: service_started
#    environment:
#      - SPRING_CLOUD_CONFIG_ENABLED=false
#      - SPRING_CONFIG_IMPORT=optional:classpath:/application.yml # using without config server
    healthcheck:
      test: ["CMD-SHELL", "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/8085; printf \"GET /actuator/health HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3; head -n 1 <&3 | grep -q \" 200 \"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - tsp-network

  task-service:
    container_name: tsp_task_service
    build:
      context: ./backend/task-service
      dockerfile: Dockerfile
    ports:
      - "8086:8086"
    env_file:
      - .env
    environment:
      - APPLICATION_PORT=8086
      - OUTBOX_PUBLISHER_ENABLED=${OUTBOX_PUBLISHER_ENABLED:-true}
      - OUTBOX_PUBLISHER_ADAPTER=${OUTBOX_PUBLISHER_ADAPTER:-kafka}
      - OUTBOX_PUBLISHER_KAFKA_BOOTSTRAP_SERVERS=${OUTBOX_PUBLISHER_KAFKA_BOOTSTRAP_SERVERS:-${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}}
      - OUTBOX_PUBLISHER_KAFKA_TOPIC=${OUTBOX_PUBLISHER_KAFKA_TOPIC:-${KAFKA_TASK_EVENTS_TOPIC:-platform.task-events}}
      - NOTIFICATION_ASSIGNMENT_REST_ENABLED=${NOTIFICATION_ASSIGNMENT_REST_ENABLED:-false}
      - NOTIFICATION_KAFKA_ENABLED=${NOTIFICATION_KAFKA_ENABLED:-true}
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/8086; printf \"GET /actuator/health HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3; head -n 1 <&3 | grep -q \" 200 \"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - tsp-network

networks:
  tsp-network:
    driver: bridge
