server:
  port: ${APPLICATION_PORT:8086}

spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${TASK_POSTGRES_DB:tasks_db}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://eureka-server:8761/eureka}

management:
  endpoints:
    web:
      exposure:
        include: health,info

jwt:
  secret: ${JWT_SECRET}

notification-service:
  enabled: ${NOTIFICATION_SERVICE_ENABLED:true}
  assignment-rest-enabled: ${NOTIFICATION_SERVICE_ASSIGNMENT_REST_ENABLED:true}
  base-url: ${NOTIFICATION_SERVICE_BASE_URL:http://notification-service:8087}
  connect-timeout: ${NOTIFICATION_SERVICE_CONNECT_TIMEOUT:2s}
  read-timeout: ${NOTIFICATION_SERVICE_READ_TIMEOUT:2s}

outbox:
  publisher:
    enabled: ${OUTBOX_PUBLISHER_ENABLED:false}
    adapter: ${OUTBOX_PUBLISHER_ADAPTER:logging}
    batch-size: ${OUTBOX_PUBLISHER_BATCH_SIZE:20}
    max-retries: ${OUTBOX_PUBLISHER_MAX_RETRIES:3}
    fixed-delay: ${OUTBOX_PUBLISHER_FIXED_DELAY:5s}
    kafka:
      enabled: ${OUTBOX_PUBLISHER_KAFKA_ENABLED:false}
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
      topic: ${KAFKA_TASK_EVENTS_TOPIC:platform.task-events}
