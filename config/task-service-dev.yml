server:
  port: ${APPLICATION_PORT:8086}

spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${TASK_POSTGRES_DB:tasks_db}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://eureka-server:8761/eureka}

management:
  endpoints:
    web:
      exposure:
        include: health,info

jwt:
  secret: ${JWT_SECRET}

notification-service:
  enabled: ${NOTIFICATION_SERVICE_ENABLED:false}
  base-url: ${NOTIFICATION_SERVICE_BASE_URL:http://notification-service:8087}
  connect-timeout: ${NOTIFICATION_SERVICE_CONNECT_TIMEOUT:2s}
  read-timeout: ${NOTIFICATION_SERVICE_READ_TIMEOUT:2s}
