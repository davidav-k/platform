server:
  port: ${APPLICATION_PORT:8086}

spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${TASK_POSTGRES_DB:tasks_db}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://eureka-server:8761/eureka}

management:
  endpoints:
    web:
      exposure:
        include: health,info

jwt:
  secret: ${JWT_SECRET}

outbox:
  publisher:
    enabled: ${OUTBOX_PUBLISHER_ENABLED:true}
    adapter: ${OUTBOX_PUBLISHER_ADAPTER:kafka}
    batch-size: ${OUTBOX_PUBLISHER_BATCH_SIZE:20}
    max-retries: ${OUTBOX_PUBLISHER_MAX_RETRIES:3}
    fixed-delay: ${OUTBOX_PUBLISHER_FIXED_DELAY:5s}
    kafka:
      enabled: ${OUTBOX_PUBLISHER_KAFKA_ENABLED:false}
      bootstrap-servers: ${OUTBOX_PUBLISHER_KAFKA_BOOTSTRAP_SERVERS:${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}}
      topic: ${OUTBOX_PUBLISHER_KAFKA_TOPIC:${KAFKA_TASK_EVENTS_TOPIC:platform.task-events}}
