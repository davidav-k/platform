spring:
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
  mail:
    host: localhost
    port: 3025
    username: test
    password: test
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
    verify:
      host: http://localhost:8080
  main:
    allow-bean-definition-overriding: true
jwt:
  expiration-seconds: 86400
  secret: test-secret-key-test-secret-key-test-secret-key-test-secret-key-test-secret-key-test
auth:
  cookie:
    secure: false
    same-site: Lax
    access-max-age-seconds: 600
    refresh-max-age-seconds: 7200
api:
  endpoint:
    base-url: /api/v1
admin:
  password: admin
logging:
  level:
    root: INFO
    org.springframework: INFO
    org.testcontainers: INFO
